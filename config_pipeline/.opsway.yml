version: "1"

stages:
  - code_quality
  - deploy
  - tests

# ── Code Quality ───────────────────────────────────────────────────────────────

code_quality:
  stage: code_quality
  image: python:3.11
  script:
    - apt-get update -qq && apt-get install -y git --no-install-recommends -qq
    - pip install pre-commit --quiet
    - pre-commit run --all-files --config .pre-commit-config.yml
  allow_failure: true

# ── Deploy ─────────────────────────────────────────────────────────────────────
# trigger: opsway — Opsway quản lý toàn bộ vòng đời container.
#
# services:
#   database:      PostgreSQL — Opsway kiểm soát tên DB, healthcheck, init schema
#   web:           Odoo — Opsway inject HOST, quản lý port, rollback
#   <tên khác>:    Service phụ (redis, …) — cần có field `image:`
#   networks:      Tuỳ chỉnh project network (driver_opts, MTU, …)
#
# web.links:       Danh sách service muốn kết nối (tên service tự động thành hostname)
#                  Opsway thêm alias vào network, không cần khai báo links cũng được
#
# Các field tự động được bỏ qua (Opsway quản lý):
#   depends_on, networks (trong từng service), container_name, restart
#
# Biến môi trường hỗ trợ cú pháp: ${VAR:-default}
# Built-in vars: PROJECT_NAME, BRANCH_NAME + tất cả env vars của branch
#
# Lưu ý về HOST trong web.environment:
#   - Khai báo để tài liệu hoá, Opsway luôn override bằng hostname thực của postgres

deploy_development:
  stage: deploy
  trigger: opsway
  environment: development
  when: auto
  services:
    database:
      image: postgres:15-alpine
      shm_size: 1g
      volumes:
        - db_data:/var/lib/postgresql/data/pg_data
        - ./backup:/etc/backup
      environment:
        POSTGRES_USER: ${DB_USER:-odoo}
        POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo}
        PGDATA: /var/lib/postgresql/data/pg_data
    web:
      image: odoo:16.0
      links:
        - database
      command: /bin/bash -c "pip3 install -r /opt/requirements.txt --quiet 2>/dev/null; odoo"
      volumes:
        - ./requirements.txt:/opt/requirements.txt
        - ./odoo.conf:/etc/odoo/odoo.conf
        - ./addons:/mnt/extra-addons
      environment:
        HOST: database
        USER: ${DB_USER:-odoo}
        PASSWORD: ${DB_PASSWORD:-odoo}
        LIST_DB: "False"
        SERVER_WIDE_MODULES: "base,web"
    networks:
      odoo_net:
        driver_opts:
          com.docker.network.driver.mtu: 1450

deploy_staging:
  stage: deploy
  trigger: opsway
  environment: staging
  when: auto

deploy_production:
  stage: deploy
  trigger: opsway
  environment: production
  when: manual

# ── Tests ──────────────────────────────────────────────────────────────────────

tests:
  stage: tests
  exec_in: odoo
  script:
    - odoo --test-enable --test-tags at_install --stop-after-init -d ${DB_NAME} --db_host ${DB_HOST}
  allow_failure: true
  only:
    - development
