exclude: |
  (?x)
  # NOT INSTALLABLE ADDONS
  # END NOT INSTALLABLE ADDONS
  # Auto-generated or tool-managed files
  ^setup/|/static/description/index\.html$|
  \.svg$|/tests/([^/]+/)?cassettes/|^\.copier-answers\.yml$|^\.github/|
  ^README\.md$|
  /static/(src/)?lib/|
  ^docs/_templates/.*\.html$|
  readme/.*\.(rst|md)$|
  /build/|/dist/|
  /tests/samples/.*|
  (LICENSE.*|COPYING.*)|
  addons/enterprise/|
  backup/|
  requirements.txt|odoo.conf.template|docker-compose.yml|docker-compose-gitlab-ci.yml|
  \.pylintrc-mandatory|\.pylintrc|\.prettierrc\.yml|\.pre-commit-config\.yaml|
  \.isort\.cfg|\.gitlab-ci\.yml|\.gitignore|\.flake8|\.eslintrc\.yml|\.eslintrc|
  \.env|\.editorconfig

default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: forbidden-files
        name: forbidden files
        entry: found forbidden files; remove them
        language: fail
        files: '\.rej$'
      - id: en-po-files
        name: en.po files cannot exist
        entry: found a en.po file
        language: fail
        files: '[a-zA-Z0-9_]*/i18n/en\.po$'

  - repo: https://github.com/PyCQA/flake8
    rev: 5.0.4
    hooks:
      - id: flake8
        name: flake8
        exclude: 'tests|env|docs'
        additional_dependencies: ["flake8-bugbear==20.1.4"]

  - repo: https://github.com/OCA/pylint-odoo
    rev: 7.0.2
    hooks:
      - id: pylint_odoo
        name: pylint with optional checks
        args:
          - --rcfile=.pylintrc
          - --exit-zero
        verbose: true
      - id: pylint_odoo
        args:
          - --rcfile=.pylintrc-mandatory
